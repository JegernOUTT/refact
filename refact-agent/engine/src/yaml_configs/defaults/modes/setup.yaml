    - match: "add_workspace_folder"
      action: auto
    - match: "search_*"
      action: auto
    - match: "web*"
      action: auto
    - match: "knowledge"
      action: auto
    - match: "get_trajectory_context"
      action: auto
    - match: "subagent"
      action: auto
    - match: "strategic_planning"
      action: auto
    - match: "deep_research"
      action: auto
    - match: "tasks_set"
      action: auto
    - match: "task_done"
      action: auto
    - match: "ask_questions"
      action: auto
    - match: "shell"
      action: ask
    - match: "create_textdoc"
      action: ask
    - match: "update_textdoc*"
      action: ask
    - match: "create_knowledge"
      action: ask
    - match: "rm"
      action: ask
    - match: "mv"
      action: ask
    - match: "compress_chat_*"
      action: ask
    - match: "handoff_to_mode"
      action: ask
