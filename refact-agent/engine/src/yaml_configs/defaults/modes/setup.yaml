  - cat
  - add_workspace_folder
  - search_pattern
  - search_symbol_definition
  - search_semantic
  - web
  - web_search
  - shell
  - search_trajectories
  - get_trajectory_context
  - knowledge
  - create_knowledge
  - create_textdoc
  - update_textdoc
  - update_textdoc_anchored
  - update_textdoc_by_lines
  - update_textdoc_regex
  - undo_textdoc
  - rm
  - mv
  - subagent
  - strategic_planning
  - deep_research
  - tasks_set
  - task_done
  - ask_questions
  - compress_chat_probe
  - compress_chat_apply
  - handoff_to_mode

