fields:
  url:
    f_type: string
    f_desc: "The URL of the MCP server, e.g., 'https://api.example.com/mcp/sse'."
  headers:
    f_type: string_to_string_map
    f_desc: "Advanced HTTP header overrides. After you apply the URL, Refact probes the server for advertised OAuth."
    f_default:
      User-Agent: "Refact.ai (+https://github.com/JegernOUTT/refact)"
      Accept: text/event-stream
      Content-Type: application/json
    f_extra: true
  auth_type:
    f_type: string_short
    f_desc: "Advanced authentication override: none, bearer, oauth2_client_credentials, or oauth2_pkce. Leave as none to discover server OAuth automatically."
    f_default: "none"
    f_extra: true
  bearer_token:
    f_type: string_long
    f_desc: "Bearer token for auth_type=bearer."
    f_default: ""
    f_extra: {"password": true}
  oauth2_client_id:
    f_type: string_short
    f_desc: "Advanced OAuth2 client ID override for auth_type=oauth2_client_credentials."
    f_default: ""
    f_extra: true
  oauth2_client_secret:
    f_type: string_long
    f_desc: "Advanced OAuth2 client secret override for auth_type=oauth2_client_credentials."
    f_default: ""
    f_extra: {"password": true}
  oauth2_token_url:
    f_type: string_long
    f_desc: "Advanced OAuth2 token endpoint override for auth_type=oauth2_client_credentials."
    f_default: ""
    f_extra: true
  oauth2_scopes:
    f_type: string_long
    f_desc: "Advanced OAuth2 scope override for auth_type=oauth2_client_credentials."
    f_default: ""
    f_extra: true
  init_timeout:
    f_type: string_short
    f_desc: "Timeout in seconds for MCP server initialization."
    f_default: "60"
    f_extra: true
  request_timeout:
    f_type: string_short
    f_desc: "Timeout in seconds for MCP requests."
    f_default: "30"
    f_extra: true
  sampling_policy:
    f_type: string_short
    f_desc: "What to do when the server requests LLM sampling: ask, allow, or deny."
    f_default: "ask"
    f_extra: true
  disabled_tools:
    f_type: string_long
    f_desc: "Comma-separated tool names to hide from the model."
    f_default: ""
    f_extra: true
  auto_approve_tools:
    f_type: string_long
    f_desc: "Comma-separated tool names that run without confirmation."
    f_default: ""
    f_extra: true
description: |
  You can add here an MCP (Model Context Protocol) server, connecting via the legacy HTTP+SSE transport
  (2024-11-05 protocol revision). Refact speaks real SSE first and falls back to Streamable HTTP if the
  server turns out to be modern. Enter the server URL and apply the configuration. Refact will probe for
  advertised OAuth and offer a browser login automatically when available.
  Read more about MCP here: https://www.anthropic.com/news/model-context-protocol
available:
  on_your_laptop_possible: true
  when_isolated_possible: true
confirmation:
  ask_user_default: ["*"]
  deny_default: []
smartlinks:
  - sl_label: "Test"
    sl_chat:
      - role: "user"
        content: >
          🔧 Your job is to test %CURRENT_CONFIG%. Tools that this MCP server has created should be visible to you. Don't search anything, it should be visible as
          a tools already. Run one and express happiness. If something does wrong, or you don't see the tools, ask user if they want to fix it by rewriting the config.
    sl_enable_only_with_tool: true
