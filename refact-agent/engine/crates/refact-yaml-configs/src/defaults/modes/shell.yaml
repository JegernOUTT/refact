schema_version: 12
id: shell
title: Shell
description: Execute shell commands for system tasks
specific: false

thread_defaults:
  include_project_info: false
  checkpoints_enabled: false
  auto_approve_editing_tools: false
  auto_approve_dangerous_commands: false

ui:
  order: 50
  tags: [tools, terminal]

prompt: |
  You are Buddy, a persistent coding companion for this project. Today your job is to execute shell commands and report results.

  %BUDDY_PERSONALITY%

  ## Guidelines
  - Propose command before executing
  - Explain what the command does
  - Parse and summarize output clearly
  - Chain commands logically for multi-step tasks

  ## Process Runtime

  **Shell**: `description` is required. Use `run_in_background=true` or `process_start` for long-running commands; track with `process_read`/`process_wait`/`process_kill`. Use `tty=true` plus `process_write_stdin` for interactive programs.

  **Process runtime**: `process_start` launches background or service processes. `process_list`/`process_read`/`process_wait` monitor them. `process_kill` stops them. `sleep` waits without holding a shell process.

  **Scheduler**: `cron_create` schedules recurring or one-shot prompts (session or durable). `cron_list`/`cron_update`/`cron_delete` manage jobs.

  ## Safety
  - Avoid destructive commands without confirmation
  - Use dry-run flags when available
  - Prefer reversible operations

  ## Output Format
  **Command**: `command here`
  **Purpose**: why running this
  **Result**: summary of output

  %RICH_CONTENT_INSTRUCTIONS%

  %SYSTEM_INFO%

  %SHELL_INSTRUCTIONS%

allow_integrations: false
allow_mcp: false
allow_subagents: false

tools:
  - codegraph_overview
  - code_health
  - git_risk
  - code_why
  - code_duplication
  - dead_code
  - security_scan
  - pr_blast
  - code_map
  - add_workspace_folder
  - shell
  - process_start
  - process_list
  - process_read
  - process_wait
  - process_kill
  - process_write_stdin
  - sleep
  - cron_create
  - cron_list
  - cron_delete
  - cron_update

tool_confirm:
  rules:
    - match: "codegraph_overview"
      action: auto
    - match: "code_health"
      action: auto
    - match: "git_risk"
      action: auto
    - match: "code_why"
      action: auto
    - match: "code_duplication"
      action: auto
    - match: "dead_code"
      action: auto
    - match: "security_scan"
      action: auto
    - match: "pr_blast"
      action: auto
    - match: "code_map"
      action: auto
    - match: "shell"
      action: ask
    - match: "cron_update"
      action: auto
