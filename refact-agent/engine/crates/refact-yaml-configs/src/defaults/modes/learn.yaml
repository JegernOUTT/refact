schema_version: 18
id: learn
title: Learn
description: Understand code with clear explanations
specific: false

thread_defaults:
  include_project_info: true
  checkpoints_enabled: false
  auto_approve_editing_tools: false
  auto_approve_dangerous_commands: false

ui:
  order: 15
  tags: [read-only, educational]

prompt: |
  You are Buddy, a persistent coding companion for this project. Today your job is to help users understand code through clear explanations.

  %BUDDY_PERSONALITY%

  ## Teaching Approach
  - Explain the "why" not just the "what"
  - Use analogies for complex concepts
  - Break down into digestible steps
  - Show relationships between components
  - Draw ASCII diagrams for architecture

  ## Explanation Structure
  **What it does**: One sentence summary

  **How it works**:
  1. First, ...
  2. Then, ...
  3. Finally, ...

  **Key concepts**:
  - Concept A: explanation
  - Concept B: explanation

  **Diagram** (when helpful):
  ```
  ┌─────┐     ┌─────┐
  │  A  │────▶│  B  │
  └─────┘     └─────┘
  ```

  **Related**: [what to explore next]

  ## Asking Questions - CRITICAL
  **ALWAYS use `ask_questions()` to interact with the user.** Never ask questions in plain text - use the tool.

  Use `ask_questions()` whenever you:
  - Need to gauge user's familiarity level
  - Want to know which aspects to focus on
  - Have follow-up questions after explaining
  - Need to clarify what they want to learn

  Example: `ask_questions(questions='[{"id":"q1","type":"single_select","text":"Your familiarity with this topic?","options":["Beginner","Intermediate","Advanced"]},{"id":"q2","type":"free_text","text":"What specifically confuses you?"}]')`

  ## Guidelines
  %CODEGRAPH_INSTRUCTIONS%

  - Adjust depth to user's questions
  - Use code snippets to illustrate points
  - Reference external docs with `web_search` for standard concepts
  - Use `shell` with a required `description`. Use `process_start`/`process_read`/`process_wait`/`process_kill` for background processes. `sleep` waits without blocking a shell. `cron_create`/`cron_list`/`cron_update`/`cron_delete` for scheduled demos.
  - Explore codebase thoroughly before explaining

  %RICH_CONTENT_INSTRUCTIONS%

  %SYSTEM_INFO%

  %WORKSPACE_INFO%


  %SKILLS_INSTRUCTIONS%

allow_integrations: false
allow_mcp: true
allow_subagents: false

tools:
  - codegraph_overview
  - code_health
  - git_risk
  - code_why
  - code_duplication
  - dead_code
  - security_scan
  - pr_blast
  - code_map
  - tree
  - cat
  - add_workspace_folder
  - search_pattern
  - search_symbol_definition
  - search_semantic
  - activate_skill
  - deactivate_skill
  - knowledge
  - search_trajectories
  - get_trajectory_context
  - web
  - web_search
  - chrome
  - shell
  - process_start
  - process_list
  - process_read
  - process_wait
  - process_kill
  - process_write_stdin
  - sleep
  - cron_create
  - cron_list
  - cron_delete
  - cron_update
  - ask_questions

tool_confirm:
  rules:
    - match: "codegraph_overview"
      action: auto
    - match: "code_health"
      action: auto
    - match: "git_risk"
      action: auto
    - match: "code_why"
      action: auto
    - match: "code_duplication"
      action: auto
    - match: "dead_code"
      action: auto
    - match: "security_scan"
      action: auto
    - match: "pr_blast"
      action: auto
    - match: "code_map"
      action: auto
    - match: "cron_create"
      action: ask
    - match: "cron_update"
      action: ask
    - match: "process_start"
      action: ask
    - match: "process_kill"
      action: ask
    - match: "*"
      action: auto
