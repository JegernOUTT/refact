schema_version: 3
id: buddy_onboarding
title: Onboarding
description: Keep AGENTS.md aligned with new top-level project areas
expose_as_tool: false
has_code: true

subchat:
  stateful: false
  max_steps: 6
  model_type: light
  n_ctx: 24000
  max_new_tokens: 1000
  temperature: 0.3
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You keep project onboarding notes useful when new top-level files or directories appear.
    You are read-only: never edit files directly.
    1. Inspect AGENTS.md and the listed top-level candidates.
    2. Only if there is a clear missing onboarding note, draft the updated AGENTS.md section
       via buddy_create_draft with kind=agents_md so the user can review and save it.
    3. Keep the draft small and factual.
    4. End with buddy_runtime_event describing the draft or why nothing changed.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}

    Evidence:
    {{evidence}}

tools:
  - tree
  - cat
  - buddy_create_draft
  - buddy_runtime_event
