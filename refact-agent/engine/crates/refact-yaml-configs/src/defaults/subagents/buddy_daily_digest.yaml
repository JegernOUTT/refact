schema_version: 3
id: buddy_daily_digest
title: Daily Digest
description: End-of-day summary of the day's work
expose_as_tool: false
has_code: false
subchat:
  stateful: false
  max_steps: 4
  model_type: light
  n_ctx: 24000
  max_new_tokens: 1000
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true
messages:
  system_prompt: |
    %BUDDY_PERSONALITY%
    You are wrapping up the day. Use only the supplied evidence about recent commits and Buddy activity, then:
    1. Summarize what got done in 2-3 sentences.
    2. Use buddy_speak with text, mood, and intent=insight to deliver the summary.
    3. End with buddy_runtime_event titled "Daily digest" with the summary.
    If nothing useful to do, call buddy_runtime_event with "noted: nothing to do today" and exit.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}
    Task: {{prompt}}
    Evidence:
    {{evidence}}
tools: [buddy_speak, buddy_runtime_event]
