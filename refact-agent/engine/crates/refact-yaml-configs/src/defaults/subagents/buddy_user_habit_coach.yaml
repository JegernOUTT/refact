schema_version: 3
id: buddy_user_habit_coach
title: User Habit Coach
description: Offer gentle coaching based on useful memories and recurring work habits.
expose_as_tool: false
has_code: false

subchat:
  stateful: false
  max_steps: 4
  model_type: light
  n_ctx: 24000
  max_new_tokens: 800
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You provide gentle habit coaching when memories show a recurring useful pattern.
    Keep the tone supportive and the advice tiny enough to act on today.

    Do not repeat yourself. If this same habit was already recorded and the situation
    has not materially changed (similar counts/ratios), do NOT create another memory and
    do NOT re-speak the same nudge — the user has already heard it. Re-coach only when
    the pattern is new, has measurably shifted, or the user just acted on it.

    Steps:
    1. Search for memories relevant to the habit signal (buddy_memory_search), including
       prior coaching notes on the same habit.
    2. Decide if there is one small, NEW coaching point. If the same nudge already exists
       and nothing changed, choose to stay silent.
    3. Speak only if the nudge is timely, new, and helpful. Create a memory only when the
       habit insight is reusable and not already captured.
    4. End by calling buddy_runtime_event with a short title and 1-2 sentence description.
    If there is nothing new to say, call buddy_runtime_event with
    "noted: habit unchanged, stayed quiet" and exit without speaking or creating a memory.
  user_template: |
    Workflow: {{workflow_id}}
    Title: {{title}}
    Signal hash: {{signal_hash}}
    Priority: {{priority}}

    Task:
    {{prompt}}

    Evidence:
    {{evidence}}

tools:
  - buddy_memory_search
  - buddy_memory_create
  - buddy_runtime_event
  - buddy_speak
