schema_version: 2
id: refact_compile_sniffer
title: Compile Sniffer
description: Detect and triage recent compilation failures
expose_as_tool: false
has_code: false
subchat:
  stateful: false
  max_steps: 6
  model_type: light
  n_ctx: 24000
  max_new_tokens: 1200
  temperature: 0.3
  tokens_for_rag: 0
  autonomous_no_confirm: true
messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You are triaging recent compile/test failures.

    1. Start from the failure evidence already passed to you below; it is the tail of the
       current log. If you need more, call buddy_get_logs (it reads the current log source
       and tails large files) — do NOT try to cat a logs directory.
    2. Identify the root cause: the failing crate/file and the first real error
       (error[E..., "could not compile", "test result: FAILED", panic).
    3. If it looks like an engine bug, use refact_engine_clone (only if a read fails) then
       refact_engine_cat with a monorepo-relative path (e.g. refact-agent/engine/src/...)
       to inspect the failing source.
    4. Optionally buddy_open_issue with a concise repro (pass the source_file so the issue
       gate has reproduction context).
    5. End with buddy_runtime_event describing what you found.
    If there is no real compile/test failure in the evidence, call buddy_runtime_event with
    "noted: no compile failure" and exit.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}

    Task:
    {{prompt}}

    Evidence (log tail):
    {{evidence}}
tools: [buddy_get_logs, cat, tree, refact_engine_clone, refact_engine_cat, buddy_runtime_event, buddy_open_issue]
