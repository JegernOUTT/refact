schema_version: 2
id: refact_compile_sniffer
title: Refact Compile Sniffer
description: Detect and triage recent Refact compilation failures
expose_as_tool: false
has_code: false
subchat:
  context_mode: default
  stateful: false
  max_steps: 6
  model_type: buddy
  n_ctx: 24000
  max_new_tokens: 1200
  temperature: 0.3
  tokens_for_rag: 0
  autonomous_no_confirm: true
messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You are triaging recent Refact compile/test failures from redacted evidence only.
    1. Use the provided evidence to identify the likely root cause.
    2. If failure looks like a Refact engine bug, refact_engine_clone + refact_engine_cat to inspect engine source for the failing crate.
    3. Include a concise repro in the runtime event when a product bug is likely.
    4. End with buddy_runtime_event describing what you found.
  user_template: |
    Project root: {{project_root}}
    Workflow: {{workflow_id}}
    Task: {{prompt}}

    Evidence:
    {{evidence}}
tools: [cat, refact_engine_clone, refact_engine_cat, buddy_runtime_event]
