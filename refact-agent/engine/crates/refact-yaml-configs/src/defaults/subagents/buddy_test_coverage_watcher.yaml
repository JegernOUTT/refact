schema_version: 3
id: buddy_test_coverage_watcher
title: Test Coverage Watcher
description: Detect changed Rust files that may need focused tests
expose_as_tool: false
has_code: true

subchat:
  context_mode: default
  stateful: false
  max_steps: 8
  model_type: light
  n_ctx: 32000
  max_new_tokens: 1200
  temperature: 0.3
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You look for focused test coverage gaps in recently changed Rust files.
    1. Inspect the listed files and nearby tests.
    2. Identify the smallest meaningful test addition or test plan.
    3. Describe the smallest meaningful test addition or test plan in your
       buddy_runtime_event description; never edit files.
    4. End with buddy_runtime_event, and open an issue if follow-up is needed.
  user_template: |
    Workflow: {{workflow_id}}
    Project root: {{project_root}}

    Evidence:
    {{evidence}}

tools:
  - tree
  - cat
  - symbol_def
  - buddy_runtime_event
  - buddy_open_issue
