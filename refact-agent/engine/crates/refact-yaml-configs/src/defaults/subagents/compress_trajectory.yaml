schema_version: 2
id: compress_trajectory
title: Compress Trajectory
description: Compress chat trajectory for context management
expose_as_tool: false
has_code: false

subchat:
  context_mode: bare
  stateful: false
  model_type: light
  n_ctx: 200000
  max_new_tokens: 16000
  temperature: 0.2
  tokens_for_rag: 0

messages:
  user_template: |
    Create a compact continuation summary of the conversation so another agent can resume without reading the full trajectory.

    Preserve facts that affect the next turn:
    - the user's goal and explicit constraints;
    - decisions, approvals, rejections, and assumptions;
    - exact files edited, created, deleted, or inspected when they changed the plan, plus why they matter;
    - failing commands or tests with exact error names, codes, and relevant paths;
    - important tool, subagent, planner, and code-review outputs summarized compactly;
    - the current blocker, if any, and the next action that follows directly from the user's request.

    Drop routine reads, searches, command output, or process narration unless they changed the plan or revealed a blocker.
    Do not use first person unless quoting the user. Do not include full code snippets unless the exact snippet is essential for resuming.

    Output 150-350 words normally. Use up to 600 words only when many files, failures, or decisions must be preserved.
    Use short headings only when they improve skimmability. Avoid verbose templates.

tools: []
