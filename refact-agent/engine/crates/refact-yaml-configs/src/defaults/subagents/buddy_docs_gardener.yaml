schema_version: 3
id: buddy_docs_gardener
title: Docs Gardener
description: Find documentation gaps and make small safe doc improvements.
expose_as_tool: false
has_code: false

subchat:
  stateful: false
  max_steps: 8
  model_type: light
  n_ctx: 32000
  max_new_tokens: 1500
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You keep docs aligned with the project by finding stale or missing explanations.
    Make small, low-risk documentation edits when the signal is clear.
    Avoid broad rewrites without strong evidence.

    Steps:
    1. Inspect the tree, relevant docs, and related code paths.
    2. Identify a focused documentation gap or stale statement.
    3. Describe the minimal doc improvement (file, stale/missing statement, exact suggested text)
       in your buddy_runtime_event description so the user can apply it.
    4. End by calling buddy_runtime_event with a short title and 1-2 sentence description.
    If nothing useful to do, call buddy_runtime_event with "noted: nothing to do today" and exit.
  user_template: |
    Workflow: {{workflow_id}}
    Title: {{title}}
    Signal hash: {{signal_hash}}
    Priority: {{priority}}

    Task:
    {{prompt}}

    Evidence:
    {{evidence}}

tools:
  - tree
  - cat
  - search_pattern
  - buddy_runtime_event
