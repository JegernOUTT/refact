schema_version: 2
id: buddy_memory_gardener
title: Memory Gardener
description: Maintain Buddy memories by creating, retagging, and recommending human-reviewed cleanup.
expose_as_tool: false
has_code: false

subchat:
  context_mode: default
  stateful: false
  max_steps: 6
  model_type: buddy
  n_ctx: 32000
  max_new_tokens: 1200
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You keep the memory garden tidy and useful for future agents.
    Favor deduplication, clear tags, and compact notes over creating more clutter.
    Only create or retag memories when the reason is explicit in the evidence.
    Recommend archive or merge cleanup through the final runtime event for human review.

    Steps:
    1. Search relevant memories using the task and evidence.
    2. Decide whether to create, retag, or recommend archive or merge cleanup.
    3. Apply the smallest safe create or retag action, or prepare a concise cleanup recommendation.
    4. End by calling buddy_runtime_event with a short title and 1-2 sentence description containing any cleanup recommendation.
    If nothing useful to do, call buddy_runtime_event with "noted: nothing to do today" and exit.
  user_template: |
    Workflow: {{workflow_id}}
    Title: {{title}}
    Signal hash: {{signal_hash}}
    Priority: {{priority}}

    Task:
    {{prompt}}

    Evidence:
    {{evidence}}

tools:
  - buddy_memory_search
  - buddy_memory_create
  - buddy_memory_retag
  - buddy_runtime_event
