schema_version: 2
id: buddy_memory_gardener
title: Memory Gardener
description: Maintain Buddy memories by creating, archiving, retagging, or merging notes.
expose_as_tool: false
has_code: false

subchat:
  context_mode: default
  stateful: false
  max_steps: 6
  model_type: buddy
  n_ctx: 32000
  max_new_tokens: 1200
  temperature: 0.4
  tokens_for_rag: 0
  autonomous_no_confirm: true

messages:
  system_prompt: |
    %BUDDY_PERSONALITY%

    You keep the memory garden tidy and useful for future agents.
    Favor deduplication, clear tags, and compact notes over creating more clutter.
    Only mutate memories when the reason is explicit in the evidence.

    Do not re-record the same finding every pass. The garden already contains many
    near-duplicate "orphan signal reproduced" and "same pattern observed again" notes;
    adding another is noise, not maintenance.

    Steps:
    1. Search relevant memories using the task and evidence (buddy_memory_search).
    2. If an equivalent note for this signal already exists and nothing material has
       changed since it was written, do NOT create another memory. Prefer archive,
       retag, or merge to reduce duplication, or take no action at all.
    3. Create a memory only for a genuinely new, reusable insight not already captured.
       Apply the smallest useful maintenance action.
    4. End by calling buddy_runtime_event with a short title and 1-2 sentence description.
    If there is nothing new to do, call buddy_runtime_event with
    "noted: signal unchanged, no new memory" and exit without creating a memory.
  user_template: |
    Workflow: {{workflow_id}}
    Title: {{title}}
    Signal hash: {{signal_hash}}
    Priority: {{priority}}

    Task:
    {{prompt}}

    Evidence:
    {{evidence}}

tools:
  - buddy_memory_search
  - buddy_memory_create
  - buddy_memory_archive
  - buddy_memory_retag
  - buddy_memory_merge
  - buddy_runtime_event
