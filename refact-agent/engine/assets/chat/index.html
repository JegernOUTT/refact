<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <title>Refact.ai Chat</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/dist/chat/style.css" />
  </head>
  <body>
    <div id="refact-chat"></div>
    <script>
      (function () {
        const origin = window.location.origin;
        const port =
          Number(window.location.port) ||
          (window.location.protocol === "https:" ? 443 : 80);
        try {
          window.localStorage.removeItem("lspUrl");
        } catch (_error) {}

        window.__REFACT_ENGINE_ORIGIN_CANDIDATES__ = [];
        const rawCandidates = Array.isArray(window.__REFACT_ENGINE_ORIGIN_CANDIDATES__)
          ? window.__REFACT_ENGINE_ORIGIN_CANDIDATES__
          : [];
        const originCandidates = [origin]
          .concat(rawCandidates)
          .filter(function (value, index, all) {
            return (
              typeof value === "string" &&
              value.length > 0 &&
              all.indexOf(value) === index
            );
          });
        let activeOrigin = origin;

        const loopbackOrigin = "http://127.0.0.1:" + port;
        const originForInput = function (input) {
          const rawUrl =
            typeof input === "string"
              ? input
              : input instanceof URL
                ? input.href
                : input instanceof Request
                  ? input.url
                  : "";
          if (!rawUrl) return null;
          try {
            return new URL(rawUrl, origin).origin;
          } catch (_error) {
            return null;
          }
        };
        const rewriteEngineUrl = function (value, targetOrigin) {
          const replacementOrigin = targetOrigin || activeOrigin;
          if (
            typeof value === "string" &&
            (value.startsWith("/v1/") || value === "/v1") &&
            replacementOrigin !== origin
          ) {
            return replacementOrigin + value;
          }
          if (typeof value === "string" && value.startsWith(loopbackOrigin)) {
            return replacementOrigin + value.slice(loopbackOrigin.length);
          }
          if (value instanceof URL && value.origin === loopbackOrigin) {
            return new URL(
              replacementOrigin + value.pathname + value.search + value.hash,
            );
          }
          if (value instanceof Request && value.url.startsWith(loopbackOrigin)) {
            return new Request(
              replacementOrigin + value.url.slice(loopbackOrigin.length),
              value,
            );
          }
          const sameOriginReplacement = targetOrigin || activeOrigin;
          if (
            sameOriginReplacement !== origin &&
            typeof value === "string" &&
            value.startsWith(origin)
          ) {
            return sameOriginReplacement + value.slice(origin.length);
          }
          if (
            sameOriginReplacement !== origin &&
            value instanceof URL &&
            value.origin === origin
          ) {
            return new URL(
              sameOriginReplacement + value.pathname + value.search + value.hash,
            );
          }
          if (
            sameOriginReplacement !== origin &&
            value instanceof Request &&
            value.url.startsWith(origin)
          ) {
            return new Request(
              sameOriginReplacement + value.url.slice(origin.length),
              value,
            );
          }
          return value;
        };
        const isRetryableEngineRequest = function (input) {
          const rawUrl =
            typeof input === "string"
              ? input
              : input instanceof URL
                ? input.href
                : input instanceof Request
                  ? input.url
                  : "";
          if (!rawUrl) return false;
          try {
            const url = new URL(rawUrl, origin);
            return url.pathname.startsWith("/v1/") || url.pathname === "/v1";
          } catch (_error) {
            return false;
          }
        };
        const retryWithOriginCandidates = function (
          input,
          init,
          firstError,
          failedOrigin,
        ) {
          if (!isRetryableEngineRequest(input) || originCandidates.length <= 1) {
            return Promise.reject(firstError);
          }
          let index = 0;
          const tryNext = function () {
            while (
              index < originCandidates.length &&
              originCandidates[index] === failedOrigin
            ) {
              index += 1;
            }
            if (index >= originCandidates.length) {
              return Promise.reject(firstError);
            }
            const candidate = originCandidates[index++];
            return originalFetch(rewriteEngineUrl(input, candidate), init).then(
              function (response) {
                activeOrigin = candidate;
                return response;
              },
              tryNext,
            );
          };
          return tryNext();
        };
        const originalFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          const rewrittenInput = rewriteEngineUrl(input);
          const attemptedOrigin = originForInput(rewrittenInput);
          return originalFetch(rewrittenInput, init).catch(function (error) {
            return retryWithOriginCandidates(input, init, error, attemptedOrigin);
          });
        };

        const initialState = {
          config: {
            host: "web",
            lspUrl: origin,
            lspPort: port,
            apiKey: null,
            engineServed: true,
            shiftEnterToSubmit: false,
            themeProps: {
              appearance: "dark",
            },
            features: {
              statistics: true,
              vecdb: true,
              ast: true,
              images: true,
            },
          },
        };

        window.__INITIAL_STATE__ = initialState;

        window.addEventListener("load", function () {
          const root = document.getElementById("refact-chat");
          if (!root) return;

          if (!window.RefactChat || typeof window.RefactChat.render !== "function") {
            root.textContent = "Refact GUI bundle failed to load.";
            return;
          }

          window.RefactChat.render(root, initialState.config);
        });
      })();
    </script>
    <script src="/dist/chat/index.umd.cjs"></script>
  </body>
</html>
