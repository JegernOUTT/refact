<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Refact.ai Chat</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/dist/chat/style.css" />
  </head>
  <body>
    <div id="refact-chat"></div>
    <script>
      (function () {
        const port =
          Number(window.location.port) ||
          (window.location.protocol === "https:" ? 443 : 80);
        try {
          window.localStorage.removeItem("lspUrl");
        } catch (_error) {}

        const engineOriginCandidates =
          /*__REFACT_ORIGIN_CANDIDATES__*/ window.__REFACT_ENGINE_ORIGIN_CANDIDATES__ || [];
        window.__REFACT_ENGINE_ORIGIN_CANDIDATES__ = Array.isArray(engineOriginCandidates)
          ? engineOriginCandidates
          : [];

        const initialState = {
          config: {
            host: "web",
            lspUrl: "",
            lspPort: port,
            apiKey: null,
            engineServed: true,
            shiftEnterToSubmit: false,
            themeProps: {
              appearance: "dark",
            },
            features: {
              statistics: true,
              vecdb: true,
              ast: true,
              images: true,
            },
          },
        };

        window.__INITIAL_STATE__ = initialState;
        const bootstrapConfig = window.__REFACT_BOOTSTRAP_CONFIG__ || {};

        window.addEventListener("load", function () {
          const root = document.getElementById("refact-chat");
          if (!root) return;

          if (!window.RefactChat || typeof window.RefactChat.render !== "function") {
            root.textContent = "Refact GUI bundle failed to load.";
            return;
          }

          window.RefactChat.render(root, {
            ...initialState.config,
            ...bootstrapConfig,
          });
        });
      })();
    </script>
    <script src="/dist/chat/index.umd.cjs"></script>
  </body>
</html>
