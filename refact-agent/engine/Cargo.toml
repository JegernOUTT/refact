[workspace]
members = [
    ".",
    "crates/refact-core",
    "crates/refact-chat-api",
    "crates/refact-vecdb",
    "crates/refact-codegraph-parsers",
    "crates/refact-codegraph",
    "crates/refact-codehealth",
    "crates/refact-git-intel",
    "crates/refact-codewiki",
    "crates/refact-llm",
    "crates/refact-knowledge-graph",
    "crates/refact-git",
    "crates/refact-postprocessing",
    "crates/refact-stats",
    "crates/refact-scratchpads",
    "crates/refact-providers",
    "crates/refact-tool-api",
    "crates/refact-chat-history",
    "crates/refact-integrations",
    "crates/refact-browser",
    "crates/refact-ext",
    "crates/refact-yaml-configs",
    "crates/refact-worktrees",
    "crates/refact-agentic",
    "crates/refact-files",
    "crates/refact-tasks",
    "crates/refact-buddy-core",
    "crates/refact-file-edit-core",
    "crates/refact-at-web",
    "crates/refact-pricing-core",
    "crates/refact-scope-utils",
    "crates/refact-caps-core",
    "crates/refact-voice",
    "crates/refact-context-api",
    "crates/refact-runtime-api",
    "crates/refact-exec",
    "crates/refact-agents-core",
    "crates/refact-self-update",
    "crates/refact-tui",
]
resolver = "2"

[workspace.dependencies]
serde = { version = "1", features = ["rc", "derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
tokio = { version = "1.43.0", features = ["fs", "io-std", "io-util", "macros", "rt-multi-thread", "signal", "process"] }
tracing = "0.1"
heed = "0.22.0"
indexmap = { version = "1.9.1", features = ["serde-1"] }
itertools = "0.14.0"
lazy_static = "1.4.0"
md5 = "0.7"
regex = "1.9.5"
ropey = "1.6"
serde_cbor = "0.11.2"
tempfile = "3.8.1"
tokenizers = "0.21.0"
tree-sitter = "0.25"
tree-sitter-cpp = "0.23"
tree-sitter-java = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-kotlin-ng = "1.1.0"
tree-sitter-python = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"
uuid = { version = "1", features = ["v4", "serde"] }

[profile.release]
#debug = true
strip = true
opt-level = "z"
lto = true

[profile.ci-release]
inherits = "release"
strip = false
lto = "thin"
codegen-units = 16

[profile.dev]
debug = "line-tables-only"

[profile.dev.package."*"]
debug = false

[profile.dev.build-override]
debug = false

# Keep CodeGraph's parser and SQLite dependencies optimized in dev builds so
# target/debug/refact-lsp indexes source at near-release speed while workspace
# crates remain debuggable. Add new tree-sitter grammar crates here.
[profile.dev.package.libsqlite3-sys]
opt-level = 3

[profile.dev.package.rusqlite]
opt-level = 3

[profile.dev.package.sqlite-vec]
opt-level = 3

[profile.dev.package.tokio-rusqlite]
opt-level = 3

[profile.dev.package.tree-sitter]
opt-level = 3

[profile.dev.package.tree-sitter-bash]
opt-level = 3

[profile.dev.package.tree-sitter-c]
opt-level = 3

[profile.dev.package.tree-sitter-c-sharp]
opt-level = 3

[profile.dev.package.tree-sitter-cpp]
opt-level = 3

[profile.dev.package.tree-sitter-elixir]
opt-level = 3

[profile.dev.package.tree-sitter-go]
opt-level = 3

[profile.dev.package.tree-sitter-haskell]
opt-level = 3

[profile.dev.package.tree-sitter-java]
opt-level = 3

[profile.dev.package.tree-sitter-javascript]
opt-level = 3

[profile.dev.package.tree-sitter-kotlin-ng]
opt-level = 3

[profile.dev.package.tree-sitter-language]
opt-level = 3

[profile.dev.package.tree-sitter-ocaml]
opt-level = 3

[profile.dev.package.tree-sitter-php]
opt-level = 3

[profile.dev.package.tree-sitter-python]
opt-level = 3

[profile.dev.package.tree-sitter-ruby]
opt-level = 3

[profile.dev.package.tree-sitter-rust]
opt-level = 3

[profile.dev.package.tree-sitter-scala]
opt-level = 3

[profile.dev.package.tree-sitter-swift]
opt-level = 3

[profile.dev.package.tree-sitter-typescript]
opt-level = 3

[package]
name = "refact-lsp"
version = "8.2.7"
edition = "2021"
build = "build.rs"

[lib]
name = "refact_lsp"
path = "src/lib.rs"

[[bin]]
name = "refact-lsp"
path = "src/main.rs"
test = false
bench = false

[[bin]]
name = "refact"
path = "src/bin/refact.rs"
test = false
bench = false

[features]
default = ["voice"]
voice = ["refact-voice/voice"]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
shadow-rs = "1.1.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.55.0"

[target.'cfg(not(windows))'.dependencies]
pnet_datalink = "0.35.0"

[dependencies]

# Pinned transitive dep (via rustls -> aws-lc-rs): aws-lc-sys 0.42.0's build script
# aborts with a false-positive "COMPILER BUG DETECTED" (gcc bug 95189) on the CI
# toolchain, breaking the x86_64-unknown-linux-gnu engine build. 0.38.0 builds cleanly
# and is compatible with aws-lc-rs 1.16.x. Cargo.lock is gitignored, so pin here.
aws-lc-sys = "=0.38.0"

refact-core = { path = "crates/refact-core" }
refact-chat-api = { path = "crates/refact-chat-api" }
refact-vecdb = { path = "crates/refact-vecdb" }
refact-codegraph = { path = "crates/refact-codegraph" }
refact-codegraph-parsers = { path = "crates/refact-codegraph-parsers" }
refact-codehealth = { path = "crates/refact-codehealth" }
refact-git-intel = { path = "crates/refact-git-intel" }
refact-codewiki = { path = "crates/refact-codewiki" }
refact-llm = { path = "crates/refact-llm" }
refact-knowledge-graph = { path = "crates/refact-knowledge-graph" }
refact-git = { path = "crates/refact-git" }
refact-postprocessing = { path = "crates/refact-postprocessing" }
refact-stats = { path = "crates/refact-stats" }
refact-scratchpads = { path = "crates/refact-scratchpads" }
refact-providers = { path = "crates/refact-providers" }
refact-tool-api = { path = "crates/refact-tool-api" }
refact-chat-history = { path = "crates/refact-chat-history" }
refact-integrations = { path = "crates/refact-integrations" }
refact-browser = { path = "crates/refact-browser" }
refact-ext = { path = "crates/refact-ext" }
refact-yaml-configs = { path = "crates/refact-yaml-configs" }
refact-worktrees = { path = "crates/refact-worktrees" }
refact-agentic = { path = "crates/refact-agentic" }
refact-files = { path = "crates/refact-files" }
refact-tasks = { path = "crates/refact-tasks" }
refact-buddy-core = { path = "crates/refact-buddy-core" }
refact-file-edit-core = { path = "crates/refact-file-edit-core" }
refact-at-web = { path = "crates/refact-at-web" }
refact-pricing-core = { path = "crates/refact-pricing-core" }
refact-scope-utils = { path = "crates/refact-scope-utils" }
refact-caps-core = { path = "crates/refact-caps-core" }
refact-voice = { path = "crates/refact-voice" }
refact-context-api = { path = "crates/refact-context-api", features = ["http-client"] }
refact-runtime-api = { path = "crates/refact-runtime-api" }
refact-exec = { path = "crates/refact-exec" }
refact-agents-core = { path = "crates/refact-agents-core" }
refact-self-update = { path = "crates/refact-self-update" }
refact-tui = { path = "crates/refact-tui" }

astral-tokio-tar = "0.5.2"
axum = { version = "0.6.20", features = ["default", "http2"] }
async-stream = "0.3.5"
async-trait = "0.1.73"
backtrace = "0.3.71"
base64 = "0.22.1"
chrono = { version = "0.4.31", features = ["serde"] }
