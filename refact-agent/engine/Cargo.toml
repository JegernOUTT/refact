# There you can use a local copy
# rmcp = { path = "../../../rust-sdk/crates/rmcp/", features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest", "auth"] }
# Pinned to a known-good rmcp rev because upstream main drifts and Cargo.lock is gitignored.
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk", rev = "63583b164f54ec6ed2f17c98450487c747d34aeb", features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest", "auth"] }
oauth2 = { version = "5.0", default-features = false }
