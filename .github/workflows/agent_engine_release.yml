name: Refact Agent Engine CI Release (Rust)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without a leading v; tag pushes derive it from engine/v<ver>.
        required: false
        type: string
  push:
    tags:
      - engine/*

# Release URL contract for installers, self-update, and IDE plugin downloaders:
# https://github.com/JegernOUTT/refact/releases/download/engine/v<ver>/refact-<ver>-<target>.<ext>
# Windows uses .zip, Unix uses .tar.gz, each archive contains only refact at its root,
# and every archive is uploaded with a matching .sha256 sidecar. Latest uses GitHub
# /releases/latest; this workflow marks engine/v<ver> releases as latest.

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

defaults:
  run:
    working-directory: refact-agent/engine

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  # RUSTFLAGS: "-D warnings -W unreachable-pub"
  RUSTUP_MAX_RETRIES: 10
  FETCH_DEPTH: 0 # pull in the tags for the version string
  MACOSX_DEPLOYMENT_TARGET: 10.15

jobs:
  dist:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64
            ext: .exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            code-target: win32-ia32
            ext: .exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64
            ext: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64
            cross: true
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64
            cross: true
          - os: macos-15-large
            target: x86_64-apple-darwin
            code-target: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    env:
      LLM_LS_TARGET: ${{ matrix.target }}

    name: dist (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - name: Derive release metadata
        id: release
        shell: bash
        env:
          MANUAL_VERSION: ${{ inputs.version || '' }}
        run: |
          if [[ -n "$MANUAL_VERSION" ]]; then
            version="$MANUAL_VERSION"
            tag="engine/v${version}"
          elif [[ "$GITHUB_REF_NAME" == engine/v* ]]; then
            version="${GITHUB_REF_NAME#engine/v}"
            tag="$GITHUB_REF_NAME"
          else
            echo "Engine releases must run from an engine/v<ver> tag or provide workflow_dispatch input version." >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.target }}
          rustup component add rust-src

      - name: Install Node.js for engine-served GUI bundle
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: refact-agent/gui/package-lock.json

      - name: Install LLVM (Windows)
        if: startsWith(matrix.os, 'windows')
        run: choco install llvm -y

      - name: Install LLVM (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install llvm

      - name: Add swap space (Linux cross-compilation needs extra RAM for LTO)
        if: matrix.cross
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=128M count=64
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Restore cached cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            refact-agent/engine -> target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo
          shared-key: ${{ matrix.os }}-${{ matrix.target }}-cargo
          cache-bin: false

      - name: Install cross-rs
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
          fallback: none

      - name: Build GUI for linux-like artifact
        if: matrix.cross
        working-directory: refact-agent/gui
        run: |
          npm ci
          npm run build

      - name: Test artifact
        if: matrix.cross == null && startsWith(matrix.os, 'windows')
        run: cargo test --release --lib --tests || exit 1

      - name: Build artifact
        if: matrix.cross == null && startsWith(matrix.os, 'windows')
        run: |
          cargo build --release --target ${{ matrix.target }} || exit 1
          cp './target/${{ matrix.target }}/release/refact${{ matrix.ext }}' .

      - name: Test artifact
        if: matrix.cross == null && !startsWith(matrix.os, 'windows')
        run: OPENSSL_STATIC=1 cargo test --release --lib --tests --target ${{ matrix.target }} || exit 1

      - name: Build artifact
        if: matrix.cross == null && !startsWith(matrix.os, 'windows')
        run: |
          OPENSSL_STATIC=1 cargo build --release --target ${{ matrix.target }} || exit 1
          cp './target/${{ matrix.target }}/release/refact${{ matrix.ext }}' .

      - name: Test linux-like artifact
        if: matrix.cross
        env:
          CARGO_BUILD_JOBS: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '2' }}
          CARGO_PROFILE_RELEASE_LTO: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'thin' || 'true' }}
          CROSS_CONTAINER_OPTS: --volume "${{ github.workspace }}/refact-agent/gui:/gui:ro"
        run: CROSS_NO_WARNINGS=0 cross test --release --lib --tests --target ${{ matrix.target }} || exit 1

      - name: Build linux-like artifact
        if: matrix.cross
        env:
          CARGO_BUILD_JOBS: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '2' }}
          CARGO_PROFILE_RELEASE_LTO: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'thin' || 'true' }}
          CROSS_CONTAINER_OPTS: --volume "${{ github.workspace }}/refact-agent/gui:/gui:ro"
        run: |
          CROSS_NO_WARNINGS=0 cross build --release --target ${{ matrix.target }} || exit 1
          cp './target/${{ matrix.target }}/release/refact${{ matrix.ext }}' .

      - name: Package release archive
        id: package
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          target="${{ matrix.target }}"
          if [[ "$target" == *msvc ]]; then
            binary="refact.exe"
            archive="refact-${version}-${target}.zip"
            pwsh -NoLogo -NoProfile -Command "Compress-Archive -Path '$binary' -DestinationPath '$archive' -CompressionLevel Optimal -Force"
          else
            binary="refact"
            archive="refact-${version}-${target}.tar.gz"
            tar -czf "$archive" "$binary"
          fi
          test -f "$binary"
          test -f "$archive"
          checksum="${archive}.sha256"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$checksum"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$checksum"
          else
            hash="$(pwsh -NoLogo -NoProfile -Command "(Get-FileHash -Algorithm SHA256 '$archive').Hash.ToLowerInvariant()")"
            printf '%s  %s\n' "$hash" "$archive" > "$checksum"
          fi
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Refact Engine v${{ steps.release.outputs.version }}
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          working_directory: refact-agent/engine
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
