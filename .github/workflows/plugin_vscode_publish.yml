name: Refact VS Code Plugin Publish

on:
  workflow_dispatch:
    inputs:
      stable_release:
        description: "Publish stable release version"
        default: false
        type: boolean
  push:
    tags:
      - "release/v*"

concurrency:
  group: plugin-vscode-publish-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  engine:
    uses: ./.github/workflows/agent_engine_build.yml

  gui:
    uses: ./.github/workflows/agent_gui_build.yml

  engine-release:
    name: Engine release
    if: startsWith(github.ref, 'refs/tags/release/v')
    needs: [engine]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: engine-dist

      - name: Package engine release assets
        id: engine-assets
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#release/v}"
          bash tools/dev/package_engine_release_assets.sh \
            --version "$version" \
            --input-dir engine-dist \
            --output-dir engine-release-assets
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish engine release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: engine/v${{ steps.engine-assets.outputs.version }}
          name: Refact Engine v${{ steps.engine-assets.outputs.version }}
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            engine-release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish:
    needs: [engine, engine-release, gui]
    if: always() && needs.engine.result == 'success' && needs.gui.result == 'success' && (needs.engine-release.result == 'success' || needs.engine-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64
          # x86_64-apple-darwin (macOS Intel) is disabled — GitHub-hosted macOS runners
          # incur significant costs and Intel Mac support is being phased out. Re-enable only if
          # explicitly needed and billing is confirmed.
          #- os: macos-15
          #  target: x86_64-apple-darwin
          #  code-target: darwin-x64
          - os: macos-15
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: publish (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: plugins/vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: plugins/vscode/assets

      - name: Download GUI package
        uses: actions/download-artifact@v4
        with:
          pattern: lts-refact-chat-js-*.tgz
          path: plugins/vscode/chat_package
          merge-multiple: true

      - name: Prepare GUI package
        shell: bash
        run: |
          mkdir -p ./chat_package_fixed
          find ./chat_package -name "*.tgz" -type f -exec cp {} ./chat_package_fixed/ \;
          ls -la ./chat_package_fixed

      - name: Install dependencies and VSCE
        shell: bash
        run: |
          npm ci
          npm install ./chat_package_fixed/*.tgz --no-save
          REFACT_CHAT_JS_VERSION=$(node -p "require('./node_modules/refact-chat-js/package.json').version")
          npm pkg set "dependencies.refact-chat-js=${REFACT_CHAT_JS_VERSION}"
          npm install -g @vscode/vsce
          rm -rf ./chat_package ./chat_package_fixed

      - name: Check release tag version
        if: startsWith(github.ref, 'refs/tags/release/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#release/v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "release tag version $TAG_VERSION does not match VS Code package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Package VS Code extension
        shell: bash
        run: |
          if [[ -f ./assets/refact-lsp && ! -f ./assets/refact ]]; then mv ./assets/refact-lsp ./assets/refact; fi
          if [[ -f ./assets/refact-lsp.exe && ! -f ./assets/refact.exe ]]; then mv ./assets/refact-lsp.exe ./assets/refact.exe; fi
          chmod +x ./assets/refact*
          if [[ "${{ github.event_name }}" != "push" && "${{ inputs.stable_release }}" != "true" ]]; then
            export PRERELEASE=--pre-release
          fi
          echo "PRERELEASE=${PRERELEASE}"
          vsce package --target ${{ matrix.code-target }} ${PRERELEASE}

      - name: Publish VS Code extension
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" && "${{ inputs.stable_release }}" != "true" ]]; then
            export PRERELEASE=--pre-release
          fi
          echo "PRERELEASE=${PRERELEASE}"
          vsce publish --skip-duplicate --pat ${{ secrets.VSCE_PAT }} ${PRERELEASE} --packagePath *.vsix

      - name: Upload VS Code package
        uses: actions/upload-artifact@v4
        with:
          name: vscode-plugin-${{ matrix.target }}
          path: plugins/vscode/*.vsix

      - name: Upload VS Code package to release
        if: startsWith(github.ref, 'refs/tags/release/v')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          file: plugins/vscode/*.vsix
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
